<table class="sample-table">
  <colgroup>
    <col style="width:71%" />
    <col style="width:13%" />
    <col style="width:16%" />
  </colgroup>
  <tr>
    <td class="sample-photo-cell" rowspan="12" style="width:71%">
      [PHOTO_CELL]
    </td>
    <td class="sample-label" style="width:13%">Item number</td>
    <td class="sample-value" style="width:16%">[ITEM_NUMBER]</td>
  </tr>
  <tr>
    <td class="sample-label sample-ref-label" style="width:13%">Sample ref.</td>
    <td class="sample-value sample-ref-value" style="width:16%">[SAMPLE_REFERENCE]</td>
  </tr>
  <tr>
    <td class="sample-label" colspan="2">Location and description</td>
  </tr>
  <tr>
    <td class="sample-location-content" colspan="2">[LOCATION_DESCRIPTION]</td>
  </tr>
  <tr>
    <td class="sample-label" colspan="2">Sample type</td>
  </tr>
  <tr>
    <td class="sample-value" colspan="2">[SAMPLE_TYPE]</td>
  </tr>
  <tr>
    <td class="sample-label" colspan="2">Paint colour</td>
  </tr>
  <tr>
    <td class="sample-value" colspan="2">[PAINT_COLOUR]</td>
  </tr>
  <tr>
    <td class="sample-label" colspan="2">Sample area (dust)</td>
  </tr>
  <tr>
    <td class="sample-value" colspan="2">[SAMPLE_AREA]</td>
  </tr>
  <tr>
    <td class="sample-label" colspan="2">Lead content / concentration</td>
  </tr>
  <tr>
    <td class="sample-value sample-asbestos-content-cell" colspan="2">[LEAD_RESULT]</td>
  </tr>
  <tr class="comments-row">
    <td colspan="3" style="width: 100%">
      <div class="comments-cell-inner">
        <strong>Recommendation Actions/Comments:</strong><br />[COMMENTS]
      </div>
    </td>
  </tr>
</table>
